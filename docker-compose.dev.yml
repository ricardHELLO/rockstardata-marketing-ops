version: '3.8'
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: marketing_ops
      POSTGRES_USER: rockstar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rockstar_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rockstar -d marketing_ops"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
