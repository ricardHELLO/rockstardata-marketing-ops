# docker-compose.yml — Full stack for local production testing
# 3 services: postgres (shared) + marketing-ops backend + paperclip AI
#
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose up -d
#
# Paperclip UI: http://localhost:3100
# Marketing Ops API: http://localhost:8000
# Admin panel: http://localhost:8000/admin

services:
  # ─── PostgreSQL (shared by marketing-ops and paperclip) ──────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketing_ops
      POSTGRES_USER: rockstar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rockstar_dev}
      PAPERCLIP_DB_PASSWORD: ${PAPERCLIP_DB_PASSWORD:-paperclip_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rockstar -d marketing_ops"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── Marketing Ops Backend (Express/TypeScript) ──────────────────────────
  marketing-ops:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://rockstar:${DB_PASSWORD:-rockstar_dev}@postgres:5432/marketing_ops
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      PIPEDRIVE_API_TOKEN: ${PIPEDRIVE_API_TOKEN:-}
      PIPEDRIVE_OWNER_ID: ${PIPEDRIVE_OWNER_ID:-}
      PIPEDRIVE_FIELD_NUM_LOCATIONS: ${PIPEDRIVE_FIELD_NUM_LOCATIONS:-}
      PIPEDRIVE_FIELD_CONCEPT_TYPE: ${PIPEDRIVE_FIELD_CONCEPT_TYPE:-}
      PIPEDRIVE_FIELD_POS: ${PIPEDRIVE_FIELD_POS:-}
      PIPEDRIVE_FIELD_SOURCE: ${PIPEDRIVE_FIELD_SOURCE:-}
      PIPEDRIVE_FIELD_CAMPAIGN: ${PIPEDRIVE_FIELD_CAMPAIGN:-}
      PIPEDRIVE_FIELD_CARGO: ${PIPEDRIVE_FIELD_CARGO:-}
      PIPEDRIVE_FIELD_LINKEDIN_URL: ${PIPEDRIVE_FIELD_LINKEDIN_URL:-}
      PIPEDRIVE_PIPELINE_ID: ${PIPEDRIVE_PIPELINE_ID:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_APPROVAL_CHANNEL: ${SLACK_APPROVAL_CHANNEL:-}
      INSTANTLY_API_KEY: ${INSTANTLY_API_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Paperclip AI (agent orchestration) ─────────────────────────────────
  paperclip:
    build:
      context: docker/paperclip
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://paperclip:${PAPERCLIP_DB_PASSWORD:-paperclip_dev}@postgres:5432/paperclip_db
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:?PAPERCLIP_AGENT_JWT_SECRET is required}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required for claude_local adapter}
      HEARTBEAT_SCHEDULER_ENABLED: "true"
      HEARTBEAT_SCHEDULER_INTERVAL_MS: "30000"
    volumes:
      - paperclip_data:/root/.paperclip
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
  paperclip_data:
